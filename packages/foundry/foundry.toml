[profile.default]
src = "contracts"
out = "out"
libs = ["lib", "node_modules"]
fs_permissions = [{ access = "read-write", path = "./"}]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[profile.default.fuzz]
runs = 256

[profile.ci]
fuzz.runs = 10000

[rpc_endpoints]
mainnet = "https://eth.llamarpc.com"
base = "https://base-mainnet.g.alchemy.com/v2/wBvCtZIIjY_BXlXYs1T_B"
base_sepolia = "https://base-sepolia.g.alchemy.com/v2/wBvCtZIIjY_BXlXYs1T_B"
localhost = "http://localhost:8545"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}" }
base = { key = "${BASESCAN_API_KEY}" }
